<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2nd_Day</title>
    <link rel="stylesheet" href="2nd.css">
</head>
<body>
    <div>
        <center>
        <h1>Registration form</h1>
        <form>
            <label >
                Name:
                <input type="text" name="txtName" id="txtName" required placeholder="Enter your name">
            </label>
            <br>
            <label >
                Email:
                <input type="email" id="txtEmail" required placeholder="Enter your Email">
            </label>
            <br>
            <label >
                Phone no:
                <input type="text" id="txtPhone" required placeholder="Enter your Phone no">
            </label>
            <br>

            <input type="radio" name="gender" id="chkmale" checked/>
            <label for="chkmale">Male</label>


            <input type="radio" name="gender" id="chkFemale"/>
            <label for="chkFemale">Female</label>

            <input type="radio" name="gender" id="chkTransgender"/>
            <label for="chkTransgender">Transgender</label>

            <input type="radio" name="gender" id="chkother"/>
            <label for="chkother">Prefer not to say</label>
            <br>

            <label for="dtDOB">DOB</label>
            <input type="date" name="dtDOB" id="dtDOB">
            <br>

            <label for="pwdPassword">Password</label>
            <input type="password" name="pwdPassword" id="pwdPassword">

            <button>submit</button>

        </form>
        </center>
    </div>
</body>
</html>
